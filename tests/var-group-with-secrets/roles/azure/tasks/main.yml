---
- name: Show Azure extra-var secrets
  ansible.builtin.debug:
    msg:
      - "ARM_CLIENT_ID     = {{ ARM_CLIENT_ID }}"
      - "ARM_CLIENT_SECRET = {{ ARM_CLIENT_SECRET }}"
      - "ARM_TENANT_ID     = {{ ARM_TENANT_ID }}"

- name: Deplay before asserting
  ansible.builtin.pause:
    seconds: 5

- name: Assert Azure secrets from variable group (var type)
  ansible.builtin.assert:
    that:
      - ARM_CLIENT_ID == "00000000-0000-0000-0000-00000000azure"
      - ARM_CLIENT_SECRET == "fake-azure-client-secret-value"
      - ARM_TENANT_ID == "11111111-1111-1111-1111-111111111111"
    fail_msg: "azure role: extra-var secret mismatch — check variable group"
    success_msg: "azure role: Azure var secrets OK"
