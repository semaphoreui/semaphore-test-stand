---
- name: Show AWS env secrets and plain region
  ansible.builtin.debug:
    msg:
      - "AWS_ACCESS_KEY_ID     = {{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      - "AWS_SECRET_ACCESS_KEY = {{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      - "AWS_DEFAULT_REGION    = {{ lookup('env', 'AWS_DEFAULT_REGION') }}"

- name: Assert AWS secrets from variable group (env type)
  ansible.builtin.assert:
    that:
      - lookup('env', 'AWS_ACCESS_KEY_ID') == "AKIAFAKE00000000001"
      - lookup('env', 'AWS_SECRET_ACCESS_KEY') == "fake-aws-secret-access-key-32chars!!"
      - lookup('env', 'AWS_DEFAULT_REGION') == "us-east-1"
    fail_msg: "aws role: env secret or plain env var mismatch — check variable group"
    success_msg: "aws role: AWS env secrets and region OK"
