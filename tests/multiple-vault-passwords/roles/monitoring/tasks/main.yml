---
- name: Load shared infra secrets (default vault)
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/files/secrets-default.yml"
    name: infra

- name: Load monitoring-only secrets (vault2)
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/files/secrets2.yml"
    name: monitoring

- name: Deplay before asserting
  ansible.builtin.pause:
    seconds: 10 

- name: Show what monitoring received after decryption
  ansible.builtin.debug:
    msg:
      - "infra_api_key         = {{ infra.infra_api_key }}"
      - "metrics_api_token     = {{ monitoring.metrics_api_token }}"
      - "pagerduty_routing_key = {{ monitoring.pagerduty_routing_key }}"

- name: Assert monitoring got the right plaintext from both vaults
  ansible.builtin.assert:
    that:
      - infra.infra_api_key             == "DEFAULT-INFRA-SECRET-AAA111"
      - monitoring.metrics_api_token    == "MONITORING-API-TOKEN-CCC333"
      - monitoring.pagerduty_routing_key == "pd-route-9f8e7d6c5b4a"
    fail_msg: "monitoring role: decrypted value mismatch — check vault passwords / vault-ids"
    success_msg: "monitoring role: default + vault2 decrypted correctly"
