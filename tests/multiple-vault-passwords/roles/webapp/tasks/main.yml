---
- name: Load shared infra secrets (default vault)
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/files/secrets-default.yml"
    name: infra

- name: Load webapp-only secrets (vault1)
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/files/secrets1.yml"
    name: webapp

- name: Deplay before asserting
  ansible.builtin.pause:
    seconds: 10 

- name: Show what webapp received after decryption
  ansible.builtin.debug:
    msg:
      - "infra_api_key       = {{ infra.infra_api_key }}"
      - "bastion_ssh_password = {{ infra.bastion_ssh_password }}"
      - "db_password         = {{ webapp.db_password }}"
      - "jwt_signing_key     = {{ webapp.jwt_signing_key }}"

- name: Assert webapp got the right plaintext from both vaults
  ansible.builtin.assert:
    that:
      - infra.infra_api_key       == "DEFAULT-INFRA-SECRET-AAA111"
      - infra.bastion_ssh_password == "shared-bastion-Pa$$w0rd"
      - webapp.db_password        == "WEBAPP-DB-SECRET-BBB222"
      - webapp.jwt_signing_key    == "webapp-jwt-key-do-not-share"
    fail_msg: "webapp role: decrypted value mismatch — check vault passwords / vault-ids"
    success_msg: "webapp role: default + vault1 decrypted correctly"
